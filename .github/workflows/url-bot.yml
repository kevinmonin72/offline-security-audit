name: Collecteur d'URLs Bot

on:
  # Permet de lancer le bot manuellement depuis l'interface GitHub
  workflow_dispatch:
  # Exécuter automatiquement 2 fois par jour (00h00 et 12h00 UTC)
  schedule:
    - cron: '0 0,12 * * *'

jobs:
  scrape-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Configurer Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Lancer le bot de recensement
        run: node url-scraper.js "https://example.com"

      - name: Cloner le dépôt de l'extension
        uses: actions/checkout@v3
        with:
          repository: 'kevinmonin72/localsec-extension'
          path: 'extension-repo'
          token: ${{ secrets.GH_PAT }}

      - name: Envoyer le fichier vers le dépôt de l'extension
        run: |
          cp urls-trouvees.txt extension-repo/urls-trouvees.txt
          cd extension-repo
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add urls-trouvees.txt
          git commit -m "🤖 Mise à jour automatique des URLs" || echo "Aucun changement détecté"
          git push
